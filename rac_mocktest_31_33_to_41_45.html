<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RAC Mock Test Hub — Sets 31–45</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090d18;--surface:#0f1623;--card:#121b2e;--surface2:#1a2540;
  --border:#1e2d45;--border2:#243353;
  --accent:#3b82f6;--accent2:#06b6d4;--accent3:#8b5cf6;
  --correct:#10b981;--wrong:#ef4444;--warn:#f59e0b;--skip:#64748b;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:block;}
#home{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:2.5rem 1rem 3rem;}

/* ── HOME ── */
.logo-bar{display:flex;align-items:center;gap:.6rem;margin-bottom:2.5rem;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.logo-text{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;letter-spacing:.12em;color:var(--accent2);text-transform:uppercase;}
.hero-wrap{text-align:center;margin-bottom:3rem;}
.hero-eyebrow{font-size:.78rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);padding:.3rem .8rem;border-radius:999px;display:inline-block;margin-bottom:1.2rem;}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(2.2rem,7vw,4rem);font-weight:800;line-height:1.05;margin-bottom:.8rem;}
.hero-title .grad{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{color:var(--muted2);font-size:.97rem;line-height:1.7;max-width:480px;margin:0 auto;}
.sets-section{width:100%;max-width:760px;}
.section-label{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.sets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.85rem;margin-bottom:1.5rem;}
.set-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.3rem 1.1rem;cursor:pointer;transition:all .22s ease;position:relative;overflow:hidden;user-select:none;}
.set-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,.07),rgba(6,182,212,.03));opacity:0;transition:.3s;}
.set-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 16px 48px rgba(59,130,246,.18);}
.set-card:hover::before{opacity:1;}
.set-card:active{transform:translateY(-1px);}
.sc-num{font-family:'Syne',sans-serif;font-size:2.1rem;font-weight:800;color:var(--accent);line-height:1;}
.sc-label{font-size:.78rem;color:var(--muted);margin-top:.3rem;font-weight:500;}
.sc-count{font-size:.72rem;color:var(--muted);margin-top:.4rem;display:flex;align-items:center;gap:.3rem;}
.sc-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);}
.sc-badge-done{position:absolute;top:.65rem;right:.65rem;background:var(--correct);color:#fff;font-size:.6rem;font-weight:800;padding:.2rem .5rem;border-radius:999px;letter-spacing:.03em;}
.sc-score{position:absolute;bottom:.65rem;right:.65rem;font-size:.7rem;font-weight:700;color:var(--accent2);}
.stats-summary{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;}
.ss-item{text-align:center;}
.ss-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--accent2);}
.ss-label{font-size:.72rem;color:var(--muted);font-weight:500;margin-top:.1rem;}

/* ── NAV ── */
#nav{background:rgba(9,13,24,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:.7rem 1rem;position:sticky;top:0;z-index:200;display:none;}
.nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:.85rem;}
.nav-back{background:none;border:1px solid var(--border);color:var(--muted2);padding:.38rem .75rem;border-radius:8px;cursor:pointer;font-size:.82rem;font-family:'DM Sans',sans-serif;transition:.18s;flex-shrink:0;}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}
.nav-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-prog-text{font-size:.78rem;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.nav-prog-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;width:100%;margin-top:.55rem;}
.nav-prog-bar{height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .35s ease;width:0%;}

/* ── QUESTION PANEL ── */
#test-wrap{display:none;max-width:900px;margin:0 auto;padding:1.5rem 1rem 7rem;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:1.8rem 1.5rem;margin-bottom:1.1rem;transition:border-color .2s;}
.q-card:last-child{margin-bottom:0;}
.qc-head{display:flex;align-items:flex-start;gap:.8rem;margin-bottom:1.3rem;}
.q-badge{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:.78rem;padding:.3rem .65rem;border-radius:9px;white-space:nowrap;flex-shrink:0;margin-top:.1rem;letter-spacing:.02em;}
.q-text{font-size:.97rem;line-height:1.68;font-weight:500;color:var(--text);}
.opts-grid{display:flex;flex-direction:column;gap:.55rem;}
.opt-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);border-radius:13px;padding:.82rem 1rem;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:.9rem;transition:all .18s;display:flex;align-items:flex-start;gap:.7rem;line-height:1.52;width:100%;}
.opt-btn:hover:not([disabled]){border-color:var(--accent);background:rgba(59,130,246,.08);}
.opt-btn:active:not([disabled]){transform:scale(.99);}
.opt-btn.sel{border-color:var(--accent);background:rgba(59,130,246,.13);}
.opt-btn.correct{border-color:var(--correct)!important;background:rgba(16,185,129,.13)!important;color:#6ee7b7!important;}
.opt-btn.wrong{border-color:var(--wrong)!important;background:rgba(239,68,68,.1)!important;color:#fca5a5!important;}
.opt-btn[disabled]{cursor:default;}
.opt-letter{font-family:'Syne',sans-serif;font-weight:800;font-size:.75rem;color:var(--accent2);flex-shrink:0;margin-top:.13rem;}

/* ── STICKY FOOTER ── */
#sticky-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(9,13,24,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:.9rem 1rem;z-index:100;display:none;}
.sb-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.sb-info{flex:1;font-size:.83rem;color:var(--muted);min-width:100px;}
.sb-info b{color:var(--text);}
.sb-chips{display:flex;gap:.4rem;flex-wrap:wrap;}
.sb-chip{font-size:.72rem;font-weight:600;padding:.22rem .55rem;border-radius:999px;white-space:nowrap;}
.chip-c{background:rgba(16,185,129,.15);color:var(--correct);}
.chip-w{background:rgba(239,68,68,.12);color:var(--wrong);}
.chip-s{background:rgba(100,116,139,.15);color:var(--muted);}
.submit-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.72rem 1.8rem;border-radius:12px;font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;}
.submit-btn:hover:not([disabled]){opacity:.9;transform:scale(1.02);}
.submit-btn[disabled]{opacity:.35;cursor:default;transform:none;}

/* ── RESULTS ── */
#results-wrap{display:none;max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem;}
.res-header{display:flex;align-items:center;gap:.85rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.res-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;flex:1;}
.result-hero{background:var(--card);border:1px solid var(--border);border-radius:26px;padding:2.2rem 1.5rem;margin-bottom:1.2rem;text-align:center;position:relative;overflow:hidden;}
.rh-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:320px;height:320px;background:radial-gradient(ellipse,rgba(59,130,246,.1),transparent 65%);pointer-events:none;}
.score-big{font-family:'Syne',sans-serif;font-size:clamp(3.8rem,12vw,6rem);font-weight:800;line-height:1;position:relative;z-index:1;}
.score-big.pass{background:linear-gradient(135deg,var(--correct),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.score-big.fail{background:linear-gradient(135deg,var(--wrong),var(--warn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.score-denom{font-size:1.1rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;margin-top:.15rem;position:relative;z-index:1;}
.score-verdict{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:700;padding:.3rem .9rem;border-radius:999px;margin-top:.9rem;position:relative;z-index:1;}
.verdict-pass{background:rgba(16,185,129,.15);color:var(--correct);}
.verdict-fail{background:rgba(239,68,68,.12);color:var(--wrong);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.75rem;margin-top:1.5rem;}
.stat-tile{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:1rem .75rem;text-align:center;}
.st-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;}
.st-val.c{color:var(--correct);}
.st-val.w{color:var(--wrong);}
.st-val.s{color:var(--skip);}
.st-val.a{color:var(--accent2);}
.st-val.m{color:var(--warn);}
.st-label{font-size:.7rem;color:var(--muted);margin-top:.2rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.scoring-note{font-size:.78rem;color:var(--muted);margin-top:.75rem;}
.res-btns{display:flex;flex-direction:column;gap:.7rem;margin-top:.3rem;}
.btn-review{background:var(--surface2);border:1.5px solid var(--accent);color:var(--accent);padding:.8rem;border-radius:13px;font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer;transition:.18s;width:100%;text-align:center;}
.btn-review:hover{background:rgba(59,130,246,.1);}
.btn-home{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.8rem;border-radius:13px;font-family:'Syne',sans-serif;font-weight:800;font-size:.92rem;cursor:pointer;transition:.18s;width:100%;}
.btn-home:hover{opacity:.9;}
.btn-retry{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted2);padding:.8rem;border-radius:13px;font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer;transition:.18s;width:100%;}
.btn-retry:hover{border-color:var(--accent2);color:var(--accent2);}

/* ── REVIEW ── */
#review-wrap{display:none;max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem;}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;margin-bottom:1.1rem;transition:border-color .2s;}
.review-card.rc{border-color:rgba(16,185,129,.25);}
.review-card.rw{border-color:rgba(239,68,68,.25);}
.review-card.rs{border-color:rgba(100,116,139,.2);}
.rev-status{display:inline-flex;align-items:center;gap:.38rem;font-size:.75rem;font-weight:700;padding:.22rem .58rem;border-radius:999px;margin-bottom:.9rem;}
.rev-status.c{background:rgba(16,185,129,.12);color:var(--correct);}
.rev-status.w{background:rgba(239,68,68,.1);color:var(--wrong);}
.rev-status.s{background:rgba(100,116,139,.12);color:var(--skip);}
.rev-q{font-size:.95rem;line-height:1.65;font-weight:500;margin-bottom:.9rem;}
.rev-opt{font-size:.87rem;padding:.52rem .85rem;border-radius:10px;margin-bottom:.38rem;border:1.5px solid var(--border);color:var(--muted2);}
.rev-opt.rc{border-color:rgba(16,185,129,.5);background:rgba(16,185,129,.08);color:#6ee7b7;}
.rev-opt.rw{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08);color:#fca5a5;}
.rev-your{font-size:.76rem;color:var(--muted);margin:.3rem 0 .5rem;}
.exp-box{background:rgba(6,182,212,.05);border-left:3px solid var(--accent2);border-radius:0 11px 11px 0;padding:.85rem 1rem;margin-top:.75rem;}
.exp-label{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:800;color:var(--accent2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.38rem;display:flex;align-items:center;gap:.35rem;}
.exp-text{font-size:.87rem;line-height:1.68;color:var(--muted2);}
.exp-loading{font-size:.85rem;color:var(--muted);font-style:italic;display:flex;align-items:center;gap:.5rem;}
.dot-spin span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:ds .8s ease-in-out infinite;}
.dot-spin span:nth-child(2){animation-delay:.15s;background:var(--accent2);}
.dot-spin span:nth-child(3){animation-delay:.3s;background:var(--accent3);}
@keyframes ds{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.15);opacity:1}}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  #home{padding:2rem .85rem 2.5rem;}
  .sets-grid{grid-template-columns:repeat(2,1fr);}
  .hero-title{font-size:2rem;}
  .result-hero{padding:1.6rem 1rem;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .q-card{padding:1.3rem 1rem;}
  .q-text{font-size:.92rem;}
  .opt-btn{font-size:.88rem;padding:.75rem .9rem;}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="logo-bar">
    <div class="logo-icon">❄️</div>
    <div class="logo-text">RAC Exam Prep</div>
  </div>
  <div class="hero-wrap">
    <div class="hero-eyebrow">Refrigeration &amp; Air Conditioning</div>
    <h1 class="hero-title">Mock Test<br><span class="grad">Practice Hub</span></h1>
    <p class="hero-sub">15 full practice sets &mdash; 75 questions each &mdash; AI explanations on review &mdash; Negative marking (−⅓ per wrong)</p>
  </div>
  <div class="sets-section">
    <div class="section-label">Practice Sets</div>
    <div class="sets-grid" id="sets-grid"></div>
    <div class="stats-summary" id="overall-stats" style="display:none">
      <div class="ss-item"><div class="ss-val" id="oss-attempted">0</div><div class="ss-label">Tests Taken</div></div>
      <div class="ss-item"><div class="ss-val" id="oss-avg">0%</div><div class="ss-label">Avg Score</div></div>
      <div class="ss-item"><div class="ss-val" id="oss-best">—</div><div class="ss-label">Best Set</div></div>
    </div>
  </div>
</div>

<!-- NAV BAR -->
<div id="nav">
  <div class="nav-inner">
    <button class="nav-back" onclick="goHome()">&#8592; Home</button>
    <span class="nav-title" id="nav-title">Practice Set</span>
    <span class="nav-prog-text" id="nav-prog-text">0/75</span>
  </div>
  <div style="max-width:900px;margin:0 auto;padding:0 1rem;">
    <div class="nav-prog-wrap"><div class="nav-prog-bar" id="nav-prog-bar"></div></div>
  </div>
</div>

<!-- TEST -->
<div id="test-wrap"></div>

<!-- STICKY SUBMIT -->
<div id="sticky-bar">
  <div class="sb-inner">
    <div class="sb-info" id="sb-info"></div>
    <div class="sb-chips" id="sb-chips"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitTest()">Submit Test ↗</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results-wrap"></div>

<!-- REVIEW -->
<div id="review-wrap"></div>

</body>
</html>

const LETTERS = ['A','B','C','D'], KEYS = ['a','b','c','d'];
let curSet=null, userAns={}, submitted=false;
const SKEY='rac_v3';
const getScores=()=>{try{return JSON.parse(localStorage.getItem(SKEY)||'{}')}catch(e){return{}}};
const saveScore=(n,d)=>{let s=getScores();s[n]=d;localStorage.setItem(SKEY,JSON.stringify(s));};

function showOnly(id){
  ['home','test-wrap','results-wrap','review-wrap'].forEach(s=>{
    const el=document.getElementById(s);
    if(el) el.style.display=s===id?'block':'none';
  });
  document.getElementById('nav').style.display=id==='test-wrap'?'block':'none';
  document.getElementById('sticky-bar').style.display=id==='test-wrap'?'block':'none';
  window.scrollTo(0,0);
}

function renderHome(){
  showOnly('home');
  const scores=getScores();
  const grid=document.getElementById('sets-grid');
  grid.innerHTML='';
  for(let n=31;n<=45;n++){
    const sc=scores[n];
    const card=document.createElement('div');
    card.className='set-card';
    card.onclick=()=>startTest(n);
    card.innerHTML=`<div class="sc-num">${n}</div><div class="sc-label">Practice Set</div><div class="sc-count"><span class="sc-dot"></span>75 Questions</div>${sc?`<div class="sc-badge-done">✓ Done</div><div class="sc-score">${sc.score>=0?'+':''}${Math.round(sc.score*10)/10} pts</div>`:''}`;
    grid.appendChild(card);
  }
  const attempted=Object.keys(scores).length;
  const overall=document.getElementById('overall-stats');
  if(attempted>0){
    overall.style.display='flex';
    document.getElementById('oss-attempted').textContent=attempted;
    const avg=Math.round(Object.values(scores).reduce((a,b)=>a+(b.pct||0),0)/attempted);
    document.getElementById('oss-avg').textContent=avg+'%';
    const best=Object.entries(scores).sort((a,b)=>(b[1].pct||0)-(a[1].pct||0))[0];
    document.getElementById('oss-best').textContent='Set '+best[0];
  } else { overall.style.display='none'; }
}

function goHome(){
  curSet=null;userAns={};submitted=false;
  document.getElementById('test-wrap').innerHTML='';
  document.getElementById('results-wrap').innerHTML='';
  document.getElementById('review-wrap').innerHTML='';
  renderHome();
}

function startTest(num){
  curSet=num;userAns={};submitted=false;
  document.getElementById('nav-title').textContent=`Practice Set ${num}`;
  buildQuestions();
  showOnly('test-wrap');
  updateProgress();
}

function buildQuestions(){
  const qs=SETS_DATA[curSet]||[];
  const wrap=document.getElementById('test-wrap');
  wrap.innerHTML='';
  qs.forEach(q=>{
    const card=document.createElement('div');
    card.className='q-card';card.id=`qc-${q.n}`;
    card.innerHTML=`<div class="qc-head"><span class="q-badge">Q${q.n}</span><span class="q-text">${q.q}</span></div><div class="opts-grid">${(q.o||[]).map((o,i)=>`<button class="opt-btn" id="opt-${q.n}-${i}" onclick="pick(${q.n},${i})"><span class="opt-letter">${LETTERS[i]}</span><span>${o}</span></button>`).join('')}</div>`;
    wrap.appendChild(card);
  });
}

function pick(qn,oi){
  if(submitted)return;
  userAns[qn]=KEYS[oi];
  for(let i=0;i<4;i++){const b=document.getElementById(`opt-${qn}-${i}`);if(b)b.classList.toggle('sel',i===oi);}
  updateProgress();
}

function updateProgress(){
  const total=(SETS_DATA[curSet]||[]).length;
  const answered=Object.keys(userAns).length;
  document.getElementById('nav-prog-text').textContent=`${answered}/${total}`;
  document.getElementById('nav-prog-bar').style.width=`${(answered/total)*100}%`;
  document.getElementById('sb-info').innerHTML=`<b>${answered}</b> answered &nbsp;·&nbsp; <b>${total-answered}</b> remaining`;
  document.getElementById('sb-chips').innerHTML=`<span class="sb-chip chip-s">— ${total-answered} unanswered</span>`;
  document.getElementById('submit-btn').disabled=answered===0;
}

function submitTest(){
  const total=(SETS_DATA[curSet]||[]).length;
  const un=total-Object.keys(userAns).length;
  if(un>0&&!confirm(`⚠️ ${un} question${un>1?'s are':' is'} unanswered. Submit anyway?`))return;
  submitted=true;document.getElementById('submit-btn').disabled=true;
  const qs=SETS_DATA[curSet]||[];
  let c=0,w=0,sk=0;
  qs.forEach(q=>{const ua=userAns[q.n];if(!ua){sk++;return;}ua===q.a?c++:w++;});
  const score=Math.round((c-w/3)*100)/100;
  const pct=Math.round(c/total*100);
  const acc=c+w>0?Math.round(c/(c+w)*100):0;
  qs.forEach(q=>{
    const ua=userAns[q.n];const ci=KEYS.indexOf(q.a);
    for(let i=0;i<4;i++){const b=document.getElementById(`opt-${q.n}-${i}`);if(!b)continue;b.disabled=true;b.classList.remove('sel');if(i===ci)b.classList.add('correct');else if(ua&&KEYS.indexOf(ua)===i)b.classList.add('wrong');}
  });
  saveScore(curSet,{correct:c,wrong:w,skipped:sk,score,max:total,pct});
  showResults(c,w,sk,score,total,pct,acc);
}

function showResults(c,w,sk,score,max,pct,acc){
  const pass=pct>=33;
  document.getElementById('results-wrap').innerHTML=`
    <div class="res-header"><button class="nav-back" onclick="goHome()">&#8592; Home</button><div class="res-title">Practice Set ${curSet} — Results</div></div>
    <div class="result-hero">
      <div class="rh-glow"></div>
      <div class="score-big ${pass?'pass':'fail'}">${score}</div>
      <div class="score-denom">out of ${max} marks</div>
      <div class="score-verdict ${pass?'verdict-pass':'verdict-fail'}">${pass?'✓ Passed':'✗ Needs Improvement'} &nbsp;·&nbsp; ${pct}%</div>
      <div class="stats-grid">
        <div class="stat-tile"><div class="st-val c">${c}</div><div class="st-label">Correct</div></div>
        <div class="stat-tile"><div class="st-val w">${w}</div><div class="st-label">Wrong</div></div>
        <div class="stat-tile"><div class="st-val s">${sk}</div><div class="st-label">Skipped</div></div>
        <div class="stat-tile"><div class="st-val a">${acc}%</div><div class="st-label">Accuracy</div></div>
        <div class="stat-tile"><div class="st-val m">${Math.round(w/3*100)/100}</div><div class="st-label">Marks Lost</div></div>
        <div class="stat-tile"><div class="st-val" style="color:var(--accent2)">${Math.round((c+w)/max*100)}%</div><div class="st-label">Attempted</div></div>
      </div>
      <div class="scoring-note">+1 correct &nbsp;·&nbsp; −⅓ wrong &nbsp;·&nbsp; 0 skipped</div>
    </div>
    <div class="res-btns">
      <button class="btn-review" onclick="showReview()">📋 Review All Questions + AI Explanations</button>
      <button class="btn-retry" onclick="startTest(${curSet})">🔄 Retry This Set</button>
      <button class="btn-home" onclick="goHome()">&#8592; Back to Home</button>
    </div>`;
  showOnly('results-wrap');
}

const expLoaded=new Set();
function showReview(){
  const qs=SETS_DATA[curSet]||[];
  const wrap=document.getElementById('review-wrap');
  wrap.innerHTML=`<div class="res-header"><button class="nav-back" onclick="backToResults()">&#8592; Results</button><div class="res-title">Review — Set ${curSet}</div></div><p style="color:var(--muted);font-size:.82rem;margin-bottom:1.2rem;line-height:1.6;">Explanations load as you scroll. Green = correct answer, Red = your wrong pick.</p>`;
  qs.forEach(q=>{
    const ua=userAns[q.n];const ca=q.a;const ci=KEYS.indexOf(ca);
    let sc,st;
    if(!ua){sc='s';st='— Skipped';}else if(ua===ca){sc='c';st='✓ Correct';}else{sc='w';st='✗ Wrong';}
    const optsH=(q.o||[]).map((o,i)=>{let cls='rev-opt';if(i===ci)cls+=' rc';else if(ua&&KEYS.indexOf(ua)===i)cls+=' rw';return`<div class="${cls}"><strong>${LETTERS[i]}.</strong> ${o}</div>`;}).join('');
    const yourA=ua?`Your answer: (${ua.toUpperCase()}) ${(q.o||[])[KEYS.indexOf(ua)]||''}`:'You skipped this question.';
    const expContent=q.e
      ?`<div class="exp-text">${q.e}</div>`
      :`<div class="exp-loading" id="el-${q.n}"><span class="dot-spin"><span></span><span></span><span></span></span> Loading explanation…</div><div class="exp-text" id="et-${q.n}" style="display:none"></div>`;
    const card=document.createElement('div');
    card.className=`review-card r${sc}`;
    card.innerHTML=`<div class="rev-status ${sc}">${st}</div><div class="rev-q"><strong>Q${q.n}.</strong> ${q.q}</div>${optsH}<div class="rev-your">${yourA}</div><div class="exp-box" id="eb-${q.n}"><div class="exp-label">💡 Explanation</div>${expContent}</div>`;
    wrap.appendChild(card);
  });
  showOnly('review-wrap');
  setupObserver(qs);
}

function backToResults(){document.getElementById('review-wrap').style.display='none';document.getElementById('results-wrap').style.display='block';window.scrollTo(0,0);}

function setupObserver(qs){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      const qn=parseInt(e.target.dataset.qn);
      if(expLoaded.has(qn))return;
      const q=qs.find(x=>x.n===qn);
      if(!q||q.e)return;
      expLoaded.add(qn);obs.unobserve(e.target);
      loadExp(q);
    });
  },{rootMargin:'350px'});
  qs.forEach(q=>{
    if(q.e)return;
    const el=document.getElementById(`eb-${q.n}`);
    if(el){el.dataset.qn=q.n;obs.observe(el);}
  });
}

async function loadExp(q){
  const ci=KEYS.indexOf(q.a);
  const ca=(q.o||[])[ci]||'';
  const prompt=`You are an expert RAC (Refrigeration & Air Conditioning) exam tutor. Provide a clear 3-4 line technical explanation.\n\nQuestion: "${q.q}"\nOptions: ${(q.o||[]).map((o,i)=>`(${KEYS[i]}) ${o}`).join(' | ')}\nCorrect: (${q.a}) ${ca}\n\nExplain WHY this answer is correct. Be concise and technical.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();
    const txt=d.content?.[0]?.text||'Explanation unavailable.';
    const loader=document.getElementById(`el-${q.n}`);
    const textEl=document.getElementById(`et-${q.n}`);
    if(loader)loader.style.display='none';
    if(textEl){textEl.textContent=txt;textEl.style.display='block';}
  }catch(e){
    const loader=document.getElementById(`el-${q.n}`);
    if(loader)loader.innerHTML='Could not load explanation.';
  }
}

renderHome();
</script>
</body>
</html>
